name: 缅A每日推送

on:
  schedule:
    # 周一到周五 17:00 UTC = 北京时间 01:00（收盘后运行）
    - cron: '0 17 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  run-selection:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data
          key: stock-db-${{ github.run_id }}
          restore-keys: |
            stock-db-

      - name: Check database
        id: check-db
        run: |
          if [ -f "data/stock_selection.db" ]; then
            echo "db_exists=true" >> $GITHUB_OUTPUT
          else
            echo "db_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Initialize data (first run only)
        if: steps.check-db.outputs.db_exists == 'false'
        run: python main.py init
        timeout-minutes: 20

      - name: Run selection and push to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py run
        timeout-minutes: 10
